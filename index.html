<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.max.ru/js/max-app-sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        #debug { 
            background: #222; color: #0f0; padding: 10px; 
            font-size: 10px; border-radius: 10px; margin-top: 20px;
            white-space: pre-wrap; word-break: break-all;
        }
        button { width: 100%; padding: 15px; background: #81c784; border: none; border-radius: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Debug Mode 🛠️</h2>
    <button id="send">Проверить связь</button>
    <div id="debug">Ожидание данных...</div>

    <script>
        const debugDiv = document.getElementById('debug');
        const maxApp = window.MaxApp;

        // Выводим всё, что есть в URL и в SDK
        window.onload = () => {
            const info = {
                url_params: window.location.search,
                sdk_exists: !!maxApp,
                initData: maxApp?.initData || "пусто",
                initDataUnsafe: maxApp?.initDataUnsafe || "пусто"
            };
            debugDiv.innerText = JSON.stringify(info, null, 2);
        };

        document.getElementById('send').onclick = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            // Пытаемся найти хоть какой-то ID
            const userId = urlParams.get('user_id') || urlParams.get('id') || maxApp?.initDataUnsafe?.user?.id || "STILL_UNKNOWN";
            
            debugDiv.innerText += "\n\nОтправляю ID: " + userId;

            try {
                await fetch("https://328a-93-123-84-16.ngrok-free.app/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: "тест", chat_id: userId })
                });
                alert("Запрос ушел!");
            } catch (e) {
                alert("Ошибка fetch");
            }
        };
    </script>
</body>
</html>
