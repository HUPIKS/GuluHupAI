<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring AI Studio</title>
    <style>
        :root { --sakura: #ffdae9; --leaf: #a8e063; --sky: #e3f2fd; --deep-green: #2d5a27; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, var(--sakura), var(--sky)); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: rgba(255, 255, 255, 0.8); padding: 10px; border-bottom: 2px solid var(--sakura); z-index: 100; }
        .row { display: flex; gap: 8px; margin-bottom: 5px; }
        select { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--leaf); outline: none; background: white; font-size: 13px; }

        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .user { align-self: flex-end; background: var(--leaf); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #444; border-bottom-left-radius: 2px; }
        
        .bot img { width: 100%; border-radius: 15px; margin-top: 10px; border: 3px solid white; }
        .dl-btn { display: block; text-align: center; background: var(--deep-green); color: white; padding: 10px; border-radius: 12px; text-decoration: none; font-size: 13px; margin-top: 8px; font-weight: bold; }

        /* ПРЕВЬЮ И КРЕСТИК */
        #preview-box { display: none; background: white; padding: 10px 15px; border-top: 2px solid var(--leaf); align-items: center; gap: 15px; }
        .pw { position: relative; width: 60px; height: 60px; }
        #imgPreview { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; border: 2px solid var(--sakura); }
        .btn-x { position: absolute; top: -10px; right: -10px; background: #ff4d4d; color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        #input-area { background: white; padding: 15px; border-top: 1px solid var(--sakura); }
        .loader { display: none; text-align: center; font-size: 13px; color: var(--deep-green); margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 12px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 20px; border: 2px solid var(--sakura); border-radius: 30px; outline: none; }
        .send-btn { background: var(--deep-green); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="row">
            <select id="modelSelect" onchange="updateModel()">
                <option value="gemini3flash">Gemini 3 Flash</option>
                <option value="gpt54">GPT-5.4</option>
            </select>
            <select id="modeSelect">
                <option value="text">💬 Режим: Чат</option>
                <option value="photo">🎨 Режим: Создать фото</option>
            </select>
        </div>
    </div>

    <div id="chat">
        <div class="msg bot">Привет! 🌸 Выбери режим: "Чат" для общения или "Создать фото" для генерации картинок.</div>
    </div>

    <div id="preview-box">
        <div class="pw">
            <img src="" id="imgPreview">
            <button class="btn-x" onclick="clearPhoto()">✕</button>
        </div>
        <div style="font-size: 12px; color: #666;">Изображение прикреплено</div>
    </div>

    <div id="input-area">
        <div class="loader" id="loader">🌱 Обработка...</div>
        <div class="controls">
            <label style="cursor:pointer; font-size: 28px;">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="showPreview(this)"> 🖼️
            </label>
            <input type="text" id="userInput" placeholder="Напиши запрос..." onkeypress="if(event.key==='Enter')send()">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>

    <script>
        // ВНИМАНИЕ: Сюда вставь свой URL (например от ngrok)
        const BACKEND_URL = " https://328a-93-123-84-16.ngrok-free.app"; 

        function showPreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('preview-box').style.display = 'flex';
                    // Если выбрал фото, автоматически ставим режим "Создать фото"
                    document.getElementById('modeSelect').value = 'photo';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearPhoto() {
            document.getElementById('fileInput').value = "";
            document.getElementById('preview-box').style.display = 'none';
        }

        async function send() {
            const textEl = document.getElementById('userInput');
            const fileEl = document.getElementById('fileInput');
            const mode = document.getElementById('modeSelect').value;
            
            if (!textEl.value && !fileEl.files[0]) return;

            addMsg(textEl.value || "🎨 Генерация...", 'user');
            document.getElementById('loader').style.display = 'block';
            
            const fd = new FormData();
            fd.append('prompt', textEl.value);
            fd.append('mode', mode); // Отправляем выбранный режим
            if (fileEl.files[0]) fd.append('file', fileEl.files[0]);

            clearPhoto();

            try {
                const r = await fetch(`${BACKEND_URL}/api/process`, { method: 'POST', body: fd });
                const d = await r.json();
                
                if (d.type === 'photo') {
                    addImg(d.content);
                } else {
                    // Очистка от звездочек
                    const cleanText = d.content.replace(/\*/g, '');
                    addMsg(cleanText, 'bot');
                }
            } catch (e) {
                addMsg("❌ Ошибка. Проверь BACKEND_URL в коде.", 'bot');
            } finally {
                document.getElementById('loader').style.display = 'none';
                textEl.value = '';
            }
        }

        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        function addImg(b64) {
            const d = document.createElement('div');
            d.className = `msg bot`;
            const blob = b64ToBlob(b64, 'image/png');
            const url = URL.createObjectURL(blob);
            d.innerHTML = `<img src="${url}"><a href="${url}" download="ai_img.png" class="dl-btn">💾 СОХРАНИТЬ</a>`;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        function b64ToBlob(b64, type) {
            const bin = atob(b64);
            const array = [];
            for (let i = 0; i < bin.length; i++) array.push(bin.charCodeAt(i));
            return new Blob([new Uint8Array(array)], {type: type});
        }
    </script>
</body>
</html>
