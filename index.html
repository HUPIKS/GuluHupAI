<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring AI Studio</title>
    <style>
        :root { --sakura: #ffdae9; --leaf: #a8e063; --sky: #e3f2fd; --deep-green: #2d5a27; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, var(--sakura), var(--sky)); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 10px; border-bottom: 2px solid var(--sakura); }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        select { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--leaf); outline: none; background: white; cursor: pointer; }
        
        /* Табы режимов */
        .tabs { display: flex; background: rgba(0,0,0,0.05); border-radius: 15px; padding: 3px; margin-bottom: 5px; }
        .tab { flex: 1; text-align: center; padding: 8px; border-radius: 12px; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .tab.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }

        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 20px; font-size: 14px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .user { align-self: flex-end; background: var(--leaf); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #444; border-bottom-left-radius: 2px; }
        
        img { width: 100%; border-radius: 15px; display: block; margin-top: 8px; border: 2px solid white; }
        .download-btn { display: block; text-align: center; background: var(--deep-green); color: white; padding: 10px; border-radius: 12px; text-decoration: none; font-size: 12px; margin-top: 8px; font-weight: bold; }

        #input-area { background: white; padding: 15px; border-top: 1px solid var(--sakura); }
        .loader { display: none; text-align: center; font-size: 12px; color: var(--deep-green); margin-bottom: 8px; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 20px; border: 2px solid var(--sakura); border-radius: 30px; outline: none; }
        .send-btn { background: var(--deep-green); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="row">
            <select id="modelSelect" onchange="updateModel()">
                <option value="gemini3flash">Gemini 3 Flash</option>
                <option value="gpt54">GPT-5.4</option>
                <option value="claudesonnet">Claude Sonnet 4.6</option>
            </select>
            <select id="ratioSelect">
                <option value="1:1">1:1 (Квадрат)</option>
                <option value="16:9">16:9 (Горизонт)</option>
                <option value="9:16">9:16 (Сторис)</option>
                <option value="2:3">2:3 (Портрет)</option>
            </select>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="setMode('chat', this)">Чат</div>
            <div class="tab" onclick="setMode('photo', this)">Редактор фото</div>
        </div>
    </div>

    <div id="chat">
        <div class="msg bot">Привет! 🌸 Выбери формат и модель. Чтобы скачать результат, нажми на кнопку под фото.</div>
    </div>

    <div id="input-area">
        <div class="loader" id="loader">🌸 Ответ расцветает...</div>
        <div class="controls">
            <label id="fileLabel" style="display:none; cursor:pointer; font-size: 24px;">
                <input type="file" id="fileInput" accept="image/*" style="display:none"> 🖼️
            </label>
            <input type="text" id="userInput" placeholder="Напиши запрос..." onkeypress="if(event.key==='Enter')send()">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>

    <script>
        // !!! СЮДА ВСТАВЬ ССЫЛКУ НА СВОЙ БЭКЕНД (например, https://my-backend.render.com)
        const BACKEND_URL = "http://localhost:8000"; 
        let currentMode = 'chat';

        function setMode(mode, el) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('fileLabel').style.display = (mode === 'photo') ? 'block' : 'none';
        }

        async function updateModel() {
            const m = document.getElementById('modelSelect').value;
            await fetch(`${BACKEND_URL}/api/set_model`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ model: m })
            });
        }

        async function send() {
            const textEl = document.getElementById('userInput');
            const fileEl = document.getElementById('fileInput');
            const ratio = document.getElementById('ratioSelect').value;
            if (!textEl.value && !fileEl.files[0]) return;

            addMsg(textEl.value || "Загрузка фото...", 'user');
            document.getElementById('loader').style.display = 'block';

            const fd = new FormData();
            fd.append('prompt', textEl.value);
            fd.append('ratio', ratio);
            fd.append('mode', currentMode);
            if (fileEl.files[0]) fd.append('file', fileEl.files[0]);

            try {
                const r = await fetch(`${BACKEND_URL}/api/process`, { method: 'POST', body: fd });
                const d = await r.json();
                if (d.type === 'photo') addImg(d.content);
                else addMsg(d.content, 'bot');
            } catch (e) {
                addMsg("Ошибка связи ❌ Проверь, запущен ли бэкенд и правильно ли указан URL в index.html", 'bot');
            } finally {
                document.getElementById('loader').style.display = 'none';
                textEl.value = '';
                fileEl.value = '';
            }
        }

        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`;
            d.innerText = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function addImg(b64) {
            const d = document.createElement('div');
            d.className = `msg bot`;
            const src = `data:image/png;base64,${b64}`;
            d.innerHTML = `<img src="${src}"><a href="${src}" download="ai_spring_photo.png" class="download-btn">💾 СКАЧАТЬ В ГАЛЕРЕЮ</a>`;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
