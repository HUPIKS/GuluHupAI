<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GuluHup AI</title>
    <script src="https://sdk.max.ru/js/max-app-sdk.js"></script>
    <style>
        :root { --spring: #81c784; --bg: #f1f8e9; }
        body { background: var(--bg); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        textarea { width: 100%; height: 120px; border: 2px solid #ddd; border-radius: 12px; padding: 12px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { width: 100%; padding: 16px; background: var(--spring); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #status { font-size: 11px; color: #777; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h3>🌸 GuluHup AI</h3>
        <textarea id="prompt" placeholder="Напиши свой запрос..."></textarea>
        <button id="send">Отправить ✨</button>
        <div id="status">Определение ID...</div>
    </div>

    <script>
        const status = document.getElementById('status');
        
        function getUserId() {
            try {
                // Извлекаем данные из Hash, который ты скинул
                const hash = window.location.hash.substring(1); // убираем #
                const params = new URLSearchParams(hash);
                const webAppData = params.get('WebAppData');
                
                if (webAppData) {
                    const subParams = new URLSearchParams(webAppData);
                    const userJson = subParams.get('user');
                    if (userJson) {
                        const user = JSON.parse(decodeURIComponent(userJson));
                        return user.id; // Тот самый 6633548
                    }
                }
            } catch (e) { console.log("Ошибка парсинга:", e); }
            return "unknown";
        }

        const uid = getUserId();
        status.innerText = "Ваш ID: " + uid;

        document.getElementById('send').onclick = async () => {
            const text = document.getElementById('prompt').value.trim();
            if (!text) return;

            document.getElementById('send').disabled = true;
            status.innerText = "ИИ думает... 🚀";

            try {
                // ЗАМЕНИ НА СВОЙ АКТУАЛЬНЫЙ NGROK
                await fetch("https://328a-93-123-84-16.ngrok-free.app/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        prompt: text, 
                        chat_id: uid 
                    })
                });
                alert("Готово! Ответ придет в чат.");
                if (window.MaxApp?.close) window.MaxApp.close();
            } catch (e) {
                alert("Ошибка: сервер не отвечает!");
            } finally {
                document.getElementById('send').disabled = false;
                status.innerText = "Ваш ID: " + uid;
            }
        };
    </script>
</body>
</html>
