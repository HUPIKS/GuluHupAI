<script>
    const maxApp = window.MaxApp;
    if (maxApp && maxApp.expand) maxApp.expand();

    // Функция для получения параметров из URL
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    const SERVER_URL = "https://328a-93-123-84-16.ngrok-free.app";

    let mode = 'text';
    const mText = document.getElementById('mText');
    const mImg = document.getElementById('mImg');
    const btn = document.getElementById('send');
    const input = document.getElementById('prompt');

    mText.onclick = () => { mode = 'text'; mText.classList.add('active'); mImg.classList.remove('active'); };
    mImg.onclick = () => { mode = 'image'; mImg.classList.add('active'); mText.classList.remove('active'); };

    btn.onclick = async () => {
        const val = input.value.trim();
        if (!val) return alert("Поле не может быть пустым!");

        btn.disabled = true;
        btn.innerText = "ИИ думает...";

        // --- ИСПРАВЛЕНИЕ ТУТ ---
        // Пытаемся достать ID из разных мест, где его может прятать MAX
        let userId = "unknown";
        
        // 1. Пробуем через SDK
        if (maxApp && maxApp.initDataUnsafe && maxApp.initDataUnsafe.user) {
            userId = maxApp.initDataUnsafe.user.id;
        } 
        // 2. Если SDK пустое, ищем в URL (часто MAX передает его там)
        if (userId === "unknown") {
            userId = getQueryParam('user_id') || getQueryParam('chat_id') || getQueryParam('id');
        }
        // -----------------------

        const payload = {
            prompt: mode === 'image' ? "Создай " + val : val,
            chat_id: userId
        };

        try {
            const response = await fetch(SERVER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            if (data.success) {
                alert("Запрос отправлен! Бот ответит в чат.");
                if (maxApp && maxApp.close) maxApp.close();
            } else {
                alert("Ошибка: " + (data.error || "Неизвестно"));
            }
        } catch (err) {
            alert("Ошибка связи с сервером! Проверь ngrok.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Отправить ✨";
        }
    };
</script>
