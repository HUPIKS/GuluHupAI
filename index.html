<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.max.ru/js/max-app-sdk.js"></script>
    <style>
        /* Твой весенний стиль из предыдущих ответов */
        body { background: #e8f5e9; font-family: sans-serif; padding: 20px; text-align: center; }
        textarea { width: 90%; height: 100px; border-radius: 10px; padding: 10px; }
        button { background: #81c784; color: white; border: none; padding: 15px 30px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>🌸 GuluHup AI MAX</h2>
    <textarea id="userPrompt" placeholder="Напиши запрос..."></textarea>
    <button id="sendBtn">Отправить ✨</button>

    <script>
        const maxApp = window.MaxApp;
        if (maxApp && maxApp.expand) maxApp.expand();

        document.getElementById('sendBtn').onclick = async () => {
            const prompt = document.getElementById('userPrompt').value;
            const btn = document.getElementById('sendBtn');
            btn.innerText = "Думаю...";

            try {
                // ЗАМЕНИ НА СВОЙ АКТУАЛЬНЫЙ NGROK
                const response = await fetch("https://328a-93-123-84-16.ngrok-free.app/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const data = await response.json();
                alert("Ответ ИИ: " + (data.response.text || data.response));
            } catch (e) {
                alert("Ошибка связи с сервером");
            } finally {
                btn.innerText = "Отправить ✨";
            }
        };
    </script>
</body>
</html>
