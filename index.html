<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GuluHup AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f3fbf1 0%, #fef0f5 100%);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px; width: 100%; max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #fff;
        }
        h2 { color: #4caf50; text-align: center; margin-top: 0; }
        textarea {
            width: 100%; height: 100px; border: 2px solid #a5d6a7; border-radius: 15px;
            padding: 12px; box-sizing: border-box; font-size: 16px; margin: 10px 0; outline: none;
        }
        .btn {
            width: 100%; background: #81c784; color: white; border: none;
            padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); background: #66bb6a; }
        .mode-switch {
            display: flex; gap: 10px; margin-bottom: 15px;
        }
        .mode-btn {
            flex: 1; padding: 8px; border: 1px solid #a5d6a7; border-radius: 10px;
            background: white; cursor: pointer; font-size: 14px;
        }
        .mode-btn.active { background: #c8e6c9; border-color: #4caf50; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌸 GuluHup AI</h2>
        <div class="mode-switch">
            <button class="mode-btn active" id="mText">Текст ✍️</button>
            <button class="mode-btn" id="mImg">Картинка 🎨</button>
        </div>
        <textarea id="prompt" placeholder="Что хочешь спросить?"></textarea>
        <button class="btn" id="send">Отправить ✨</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let mode = 'text';
        const mText = document.getElementById('mText');
        const mImg = document.getElementById('mImg');
        const btn = document.getElementById('send');
        const input = document.getElementById('prompt');

        mText.onclick = () => { mode = 'text'; mText.classList.add('active'); mImg.classList.remove('active'); };
        mImg.onclick = () => { mode = 'image'; mImg.classList.add('active'); mText.classList.remove('active'); };

        btn.onclick = () => {
            const val = input.value.trim();
            if (!val) return tg.showAlert("Напиши что-нибудь!");
            
            // Если режим картинки — добавляем префикс для воркера
            const result = mode === 'image' ? "Создай " + val : val;
            
            tg.sendData(result); // Отправляем данные
            tg.close(); // Закрываем приложение
        };
    </script>
</body>
</html>
