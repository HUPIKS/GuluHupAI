<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GuluHup AI</title>
    <script src="https://sdk.max.ru/js/max-app-sdk.js"></script>
    <style>
        body { background: #e8f5e9; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        textarea { width: 100%; height: 120px; border-radius: 12px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #81c784; border: none; border-radius: 12px; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
        #status { font-size: 10px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🌸 GuluHup AI</h3>
        <textarea id="prompt" placeholder="Введите ваш запрос..."></textarea>
        <button id="send">Отправить ✨</button>
        <div id="status">Инициализация...</div>
    </div>

    <script>
        const maxApp = window.MaxApp;
        const status = document.getElementById('status');

        // Ждем инициализации SDK
        function getUserId() {
            try {
                // Пытаемся взять из готового объекта
                if (maxApp?.initDataUnsafe?.user?.id) return maxApp.initDataUnsafe.user.id;
                
                // Если там пусто, парсим строку initData (она выглядит как user=...)
                const params = new URLSearchParams(maxApp?.initData || window.location.hash.substring(1));
                const userRaw = params.get('user');
                if (userRaw) {
                    const user = JSON.parse(decodeURIComponent(userRaw));
                    return user.id;
                }
            } catch (e) { console.error("Ошибка парсинга:", e); }
            return "unknown";
        }

        document.getElementById('send').onclick = async () => {
            const val = document.getElementById('prompt').value.trim();
            const btn = document.getElementById('send');
            if (!val) return;

            const uid = getUserId();
            status.innerText = "Отправка для ID: " + uid;
            btn.disabled = true;

            try {
                const response = await fetch("https://328a-93-123-84-16.ngrok-free.app/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: val, chat_id: uid })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert("ИИ ответил! Проверь чат.");
                    maxApp?.close();
                }
            } catch (e) {
                alert("Ошибка: проверь ngrok на компьютере!");
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
