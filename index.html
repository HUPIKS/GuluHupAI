<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuluHup AI MAX</title>
    <script src="https://sdk.max.ru/js/max-app-sdk.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f3fbf1 0%, #fef0f5 100%);
            font-family: sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            background: white; border-radius: 20px; padding: 20px;
            width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%; height: 100px; border: 2px solid #81c784;
            border-radius: 10px; padding: 10px; margin: 10px 0;
        }
        .btn {
            width: 100%; background: #81c784; color: white; border: none;
            padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌸 GuluHup MAX</h2>
        <textarea id="userInput" placeholder="Напиши что-нибудь..."></textarea>
        <button class="btn" id="sendBtn">Отправить</button>
    </div>

    <script>
        // Инициализация MAX SDK
        const maxApp = window.MaxApp; 

        document.getElementById('sendBtn').onclick = () => {
            const text = document.getElementById('userInput').value;
            if (text) {
                // В мессенджере MAX метод отправки данных может называться иначе 
                // сверься с https://dev.max.ru/docs
                maxApp.sendData(text); 
                maxApp.close();
            }
        };
    </script>
</body>
</html>
