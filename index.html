<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GuluHup AI MAX</title>
    <script src="https://sdk.max.ru/js/max-app-sdk.js"></script>
    <style>
        :root {
            --spring-green: #e8f5e9;
            --spring-accent: #81c784;
            --spring-pink: #fce4ec;
            --spring-text: #2e7d32;
        }

        body {
            background: linear-gradient(135deg, var(--spring-green) 0%, var(--spring-pink) 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.4);
            box-sizing: border-box;
        }

        h2 {
            color: var(--spring-text);
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .mode-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--spring-accent);
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            color: var(--spring-text);
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--spring-accent);
            color: white;
        }

        textarea {
            width: 100%;
            height: 120px;
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--spring-accent);
        }

        .btn-send {
            width: 100%;
            background: var(--spring-accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(129, 199, 132, 0.4);
        }

        .btn-send:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🌸 GuluHup AI MAX</h2>
        
        <div class="mode-switch">
            <button class="mode-btn active" id="mText">Текст ✍️</button>
            <button class="mode-btn" id="mImg">Картинка 🎨</button>
        </div>

        <textarea id="prompt" placeholder="Введите ваш запрос здесь..."></textarea>
        
        <button class="btn-send" id="send">Отправить ✨</button>
    </div>

    <div class="footer">v2.0 Beta • Весна 2026</div>

    <script>
        // Инициализация MAX SDK
        const maxApp = window.MaxApp; 

        // Попытка развернуть приложение на весь экран
        if (maxApp && maxApp.expand) {
            maxApp.expand();
        }

        let currentMode = 'text';
        const mText = document.getElementById('mText');
        const mImg = document.getElementById('mImg');
        const btn = document.getElementById('send');
        const input = document.getElementById('prompt');

        // Логика переключения кнопок
        mText.onclick = () => {
            currentMode = 'text';
            mText.classList.add('active');
            mImg.classList.remove('active');
        };

        mImg.onclick = () => {
            currentMode = 'image';
            mImg.classList.add('active');
            mText.classList.remove('active');
        };

        // Отправка данных
        btn.onclick = () => {
            const val = input.value.trim();
            if (!val) {
                alert("Пожалуйста, напишите запрос! 🌸");
                return;
            }

            // Формируем финальный текст (добавляем ключевое слово для картинок)
            const resultText = currentMode === 'image' ? "Создай " + val : val;

            // ВАЖНО: Отправка через SDK MAX
            if (maxApp && maxApp.sendData) {
                maxApp.sendData(resultText); 
                maxApp.close(); 
            } else {
                console.log("Данные для отправки:", resultText);
                alert("Ошибка: SDK MAX не найден. Вы открыли страницу вне мессенджера?");
            }
        };
    </script>
</body>
</html>
