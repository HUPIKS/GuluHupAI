<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring AI Studio</title>
    <style>
        :root { --sakura: #ffdae9; --leaf: #a8e063; --sky: #e3f2fd; --deep-green: #2d5a27; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, var(--sakura), var(--sky)); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ТРИ ПАНЕЛИ НАСТРОЕК */
        .header { background: rgba(255, 255, 255, 0.85); padding: 10px; border-bottom: 2px solid var(--sakura); z-index: 100; }
        .row { display: flex; gap: 8px; flex-wrap: nowrap; }
        .panel { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .panel label { font-size: 9px; font-weight: bold; color: var(--deep-green); text-transform: uppercase; margin-left: 4px; }
        select { width: 100%; padding: 8px; border-radius: 10px; border: 1px solid var(--leaf); outline: none; background: white; font-size: 11px; cursor: pointer; }

        /* ОКНО ЧАТА */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .user { align-self: flex-end; background: var(--leaf); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #444; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        
        .bot img { width: 100%; border-radius: 15px; margin-top: 10px; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .dl-btn { display: block; text-align: center; background: var(--deep-green); color: white; padding: 10px; border-radius: 12px; text-decoration: none; font-size: 12px; margin-top: 8px; font-weight: bold; }

        /* ПРЕДПРОСМОТР ФОТО С КРЕСТИКОМ */
        #preview-bar { display: none; background: white; padding: 10px 15px; border-top: 2px solid var(--leaf); align-items: center; gap: 15px; }
        .pw { position: relative; width: 50px; height: 50px; }
        #imgPreview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 1px solid var(--sakura); }
        .btn-x { 
            position: absolute; top: -8px; right: -8px; background: #ff4d4d; color: white; border: none; 
            width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 12px; 
            display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }

        /* ПОЛЕ ВВОДА */
        #input-area { background: white; padding: 15px; border-top: 1px solid var(--sakura); }
        .loader { display: none; text-align: center; font-size: 12px; color: var(--deep-green); margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 18px; border: 2px solid var(--sakura); border-radius: 25px; outline: none; font-size: 15px; }
        .send-btn { background: var(--deep-green); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="row">
            <div class="panel">
                <label>Режим</label>
                <select id="modeSelect">
                    <option value="text">💬 Чат</option>
                    <option value="photo">🎨 Фото</option>
                </select>
            </div>
            <div class="panel">
                <label>Модель</label>
                <select id="modelSelect" onchange="updateModel()">
                    <option value="gemini3flash">Gemini 3</option>
                    <option value="gpt54">GPT-5.4</option>
                    <option value="claudesonnet">Claude</option>
                </select>
            </div>
            <div class="panel">
                <label>Формат</label>
                <select id="ratioSelect">
                    <option value="1:1">1:1</option>
                    <option value="16:9">16:9</option>
                    <option value="9:16">9:16</option>
                </select>
            </div>
        </div>
    </div>

    <div id="chat">
        <div class="msg bot">Привет! 🌸 Настрой режим и модель в панелях выше. Если выберешь фото, я автоматически переключусь в режим генерации.</div>
    </div>

    <div id="preview-bar">
        <div class="pw">
            <img src="" id="imgPreview">
            <button class="btn-x" onclick="clearPhoto()">✕</button>
        </div>
        <div style="font-size: 12px; color: #888;">Фото прикреплено</div>
    </div>

    <div id="input-area">
        <div class="loader" id="loader">🌱 Обработка...</div>
        <div class="controls">
            <label style="cursor:pointer; font-size: 24px;" title="Прикрепить фото">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)"> 🖼️
            </label>
            <input type="text" id="userInput" placeholder="Твой запрос..." onkeypress="if(event.key==='Enter')send()">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>

    <script>
        // ЗАМЕНИ НА СВОЙ URL (из ngrok или хостинга)
        const BACKEND_URL = "https://328a-93-123-84-16.ngrok-free.app"; 

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('preview-bar').style.display = 'flex';
                    document.getElementById('modeSelect').value = 'photo'; // Авто-смена режима
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearPhoto() {
            document.getElementById('fileInput').value = "";
            document.getElementById('preview-bar').style.display = 'none';
        }

        async function updateModel() {
            const m = document.getElementById('modelSelect').value;
            try {
                await fetch(`${BACKEND_URL}/api/set_model`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ model: m })
                });
            } catch(e) { console.warn("Не удалось сменить модель. Проверь сервер."); }
        }

        async function send() {
            const textEl = document.getElementById('userInput');
            const fileEl = document.getElementById('fileInput');
            const mode = document.getElementById('modeSelect').value;
            const ratio = document.getElementById('ratioSelect').value;
            
            if (!textEl.value && !fileEl.files[0]) return;

            addMsg(textEl.value || "🎨 Работаю...", 'user');
            document.getElementById('loader').style.display = 'block';
            
            const fileToSend = fileEl.files[0];
            clearPhoto();

            const fd = new FormData();
            fd.append('prompt', textEl.value);
            fd.append('mode', mode);
            fd.append('ratio', ratio);
            if (fileToSend) fd.append('file', fileToSend);

            try {
                const r = await fetch(`${BACKEND_URL}/api/process`, { method: 'POST', body: fd });
                const d = await r.json();
                
                if (d.type === 'photo') {
                    addImg(d.content);
                } else {
                    // Очистка от всех звездочек (*)
                    const cleanText = d.content.replace(/\*/g, '');
                    addMsg(cleanText, 'bot');
                }
            } catch (e) {
                addMsg("❌ Ошибка соединения. Проверь BACKEND_URL.", 'bot');
            } finally {
                document.getElementById('loader').style.display = 'none';
                textEl.value = '';
            }
        }

        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`;
            d.innerText = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function addImg(b64) {
            const d = document.createElement('div');
            d.className = `msg bot`;
            const blob = b64ToBlob(b64, 'image/png');
            const url = URL.createObjectURL(blob);
            d.innerHTML = `<img src="${url}"><a href="${url}" download="ai_image.png" class="dl-btn">💾 СОХРАНИТЬ В ГАЛЕРЕЮ</a>`;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function b64ToBlob(b64, type) {
            const bin = atob(b64);
            const array = [];
            for (let i = 0; i < bin.length; i++) array.push(bin.charCodeAt(i));
            return new Blob([new Uint8Array(array)], {type: type});
        }
    </script>
</body>
</html>
