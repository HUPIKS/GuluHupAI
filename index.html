<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring AI Studio</title>
    <style>
        :root { --sakura: #ffdae9; --leaf: #a8e063; --sky: #e3f2fd; --deep-green: #2d5a27; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: linear-gradient(135deg, var(--sakura), var(--sky)); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Шапка */
        .header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 10px; border-bottom: 2px solid var(--sakura); z-index: 10; }
        .row { display: flex; gap: 8px; margin-bottom: 5px; }
        select { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--leaf); outline: none; background: white; font-size: 13px; }

        /* Чат */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; box-shadow: 0 4px 10px rgba(0,0,0,0.05); white-space: pre-wrap; }
        .user { align-self: flex-end; background: var(--leaf); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #444; border-bottom-left-radius: 2px; }
        
        /* Фото в чате */
        .bot img { width: 100%; border-radius: 12px; margin-top: 8px; border: 2px solid #fff; cursor: pointer; }
        .dl-btn { display: inline-block; background: var(--deep-green); color: white; padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 12px; margin-top: 8px; font-weight: bold; transition: 0.2s; }
        .dl-btn:hover { opacity: 0.8; }

        /* Превью перед отправкой */
        #preview-bar { display: none; background: rgba(255,255,255,0.9); padding: 10px 15px; border-top: 1px solid var(--sakura); align-items: center; gap: 10px; }
        .preview-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid var(--leaf); }
        .cancel-btn { background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; line-height: 1; padding: 0; }

        /* Ввод */
        #input-area { background: white; padding: 15px; border-top: 1px solid var(--sakura); }
        .loader { display: none; text-align: center; font-size: 12px; color: var(--deep-green); margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 18px; border: 2px solid var(--sakura); border-radius: 25px; outline: none; }
        .send-btn { background: var(--deep-green); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="row">
            <select id="modelSelect" onchange="updateModel()">
                <option value="gemini3flash">Gemini 3 Flash</option>
                <option value="gpt54">GPT-5.4</option>
                <option value="claudesonnet">Claude Sonnet 4.6</option>
            </select>
            <select id="ratioSelect">
                <option value="1:1">1:1 (Квадрат)</option>
                <option value="16:9">16:9 (HD)</option>
                <option value="9:16">9:16 (Сторис)</option>
            </select>
        </div>
    </div>

    <div id="chat">
        <div class="msg bot">Привет! 🌸 Я обновился. Теперь можно смотреть превью фото перед отправкой и сохранять их без багов.</div>
    </div>

    <div id="preview-bar">
        <img src="" id="imgPreview" class="preview-img">
        <div style="flex:1; font-size: 12px; color: #666;">Фото готово к отправке</div>
        <button class="cancel-btn" onclick="cancelPhoto()">✕</button>
    </div>

    <div id="input-area">
        <div class="loader" id="loader">🌸 Нейроны расцветают...</div>
        <div class="controls">
            <label style="cursor:pointer; font-size: 24px;">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="showPreview(this)"> 🖼️
            </label>
            <input type="text" id="userInput" placeholder="Напиши запрос..." onkeypress="if(event.key==='Enter')send()">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>

    <script>
        // ВАЖНО: Замени на адрес твоего сервера (например: https://my-backend.onrender.com)
        const BACKEND_URL = "http://localhost:8000"; 

        function showPreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('preview-bar').style.display = 'flex';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function cancelPhoto() {
            document.getElementById('fileInput').value = "";
            document.getElementById('preview-bar').style.display = 'none';
        }

        async function updateModel() {
            const m = document.getElementById('modelSelect').value;
            await fetch(`${BACKEND_URL}/api/set_model`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ model: m })
            });
        }

        async function send() {
            const textEl = document.getElementById('userInput');
            const fileEl = document.getElementById('fileInput');
            const ratio = document.getElementById('ratioSelect').value;
            
            if (!textEl.value && !fileEl.files[0]) return;

            addMsg(textEl.value || "🎨 Обрабатываю изображение...", 'user');
            document.getElementById('loader').style.display = 'block';
            cancelPhoto();

            const fd = new FormData();
            fd.append('prompt', textEl.value);
            fd.append('ratio', ratio);
            if (fileEl.files[0]) fd.append('file', fileEl.files[0]);

            try {
                const r = await fetch(`${BACKEND_URL}/api/process`, { method: 'POST', body: fd });
                const d = await r.json();
                
                if (d.type === 'photo') {
                    addImg(d.content);
                } else {
                    // Убираем звездочки Markdown
                    const cleanText = d.content.replace(/\*\*/g, '');
                    addMsg(cleanText, 'bot');
                }
            } catch (e) {
                addMsg("❌ Ошибка связи. Убедись, что BACKEND_URL верен.", 'bot');
            } finally {
                document.getElementById('loader').style.display = 'none';
                textEl.value = '';
            }
        }

        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`;
            d.innerText = t;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        function addImg(b64) {
            const d = document.createElement('div');
            d.className = `msg bot`;
            const blob = b64ToBlob(b64, 'image/png');
            const url = URL.createObjectURL(blob);
            
            d.innerHTML = `
                <img src="${url}">
                <a href="${url}" download="ai_result_${Date.now()}.png" class="dl-btn">💾 СОХРАНИТЬ НА УСТРОЙСТВО</a>
            `;
            document.getElementById('chat').appendChild(d);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        // Функция для надежного скачивания на ПК
        function b64ToBlob(b64, type) {
            const bin = atob(b64);
            const array = [];
            for (let i = 0; i < bin.length; i++) array.push(bin.charCodeAt(i));
            return new Blob([new Uint8Array(array)], {type: type});
        }
    </script>
</body>
</html>
