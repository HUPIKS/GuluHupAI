<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring AI Studio</title>
    <style>
        :root { --sakura: #ffdae9; --leaf: #a8e063; --sky: #e3f2fd; --deep-green: #2d5a27; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: linear-gradient(135deg, var(--sakura), var(--sky)); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ШАПКА С ТРЕМЯ ПАНЕЛЯМИ */
        .header { background: rgba(255, 255, 255, 0.9); padding: 10px; border-bottom: 2px solid var(--sakura); z-index: 100; }
        .row { display: flex; gap: 8px; }
        .panel { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .panel label { font-size: 9px; font-weight: bold; color: var(--deep-green); text-transform: uppercase; padding-left: 4px; }
        select { width: 100%; padding: 8px; border-radius: 10px; border: 1px solid var(--leaf); background: white; font-size: 11px; outline: none; }

        /* ОКНО ЧАТА */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .user { align-self: flex-end; background: var(--leaf); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #444; border-bottom-left-radius: 2px; white-space: pre-wrap; }

        /* ПРЕВЬЮ ПЕРЕД ОТПРАВКОЙ */
        #preview-bar { display: none; background: white; padding: 10px 15px; border-top: 2px solid var(--leaf); align-items: center; gap: 15px; }
        .pw-box { position: relative; width: 55px; height: 55px; }
        #imgPreview { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; border: 1px solid var(--sakura); }
        .btn-x { position: absolute; top: -8px; right: -8px; background: #ff4d4d; color: white; border: none; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* ИНПУТ */
        #input-area { background: white; padding: 15px; border-top: 1px solid var(--sakura); }
        .loader { display: none; text-align: center; font-size: 12px; color: var(--deep-green); margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 12px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 20px; border: 2px solid var(--sakura); border-radius: 30px; outline: none; }
        .send-btn { background: var(--deep-green); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="row">
            <div class="panel">
                <label>Режим</label>
                <select id="modeSelect">
                    <option value="text">💬 Чат</option>
                    <option value="photo">🎨 Фото</option>
                </select>
            </div>
            <div class="panel">
                <label>Модель</label>
                <select id="modelSelect">
                    <option value="gemini3flash">Gemini 3</option>
                    <option value="gpt54">GPT-5.4</option>
                    <option value="claudesonnet">Claude</option>
                </select>
            </div>
            <div class="panel">
                <label>Формат</label>
                <select id="ratioSelect">
                    <option value="1:1">1:1</option>
                    <option value="16:9">16:9</option>
                    <option value="9:16">9:16</option>
                </select>
            </div>
        </div>
    </div>

    <div id="chat">
        <div class="msg bot">🌸 Привет! Настрой панели и отправь сообщение или фото.</div>
    </div>

    <div id="preview-bar">
        <div class="pw-box">
            <img src="" id="imgPreview">
            <button class="btn-x" onclick="clearPhoto()">✕</button>
        </div>
        <div style="font-size: 12px; color: #777;">Картинка готова</div>
    </div>

    <div id="input-area">
        <div class="loader" id="loader">🌱 Весна работает...</div>
        <div class="controls">
            <label style="cursor:pointer; font-size: 28px;">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)"> 🖼️
            </label>
            <input type="text" id="userInput" placeholder="Напиши запрос..." onkeypress="if(event.key==='Enter')send()">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>

    <script>
        // ВАЖНО: Если используешь GitHub, замени на URL от ngrok!
        const BACKEND_URL = "https://328a-93-123-84-16.ngrok-free.app"; 

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('preview-bar').style.display = 'flex';
                    document.getElementById('modeSelect').value = 'photo';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearPhoto() {
            document.getElementById('fileInput').value = "";
            document.getElementById('preview-bar').style.display = 'none';
        }

        async function send() {
            const textEl = document.getElementById('userInput');
            const fileEl = document.getElementById('fileInput');
            
            if (!textEl.value && !fileEl.files[0]) return;

            const userText = textEl.value;
            addMsg(userText || "🖼️ Отправка фото", 'user');
            document.getElementById('loader').style.display = 'block';

            const fd = new FormData();
            fd.append('prompt', userText);
            fd.append('mode', document.getElementById('modeSelect').value);
            fd.append('model', document.getElementById('modelSelect').value);
            fd.append('ratio', document.getElementById('ratioSelect').value);
            if (fileEl.files[0]) fd.append('file', fileEl.files[0]);

            textEl.value = '';
            clearPhoto();

            try {
                const r = await fetch(`${BACKEND_URL}/api/process`, { method: 'POST', body: fd });
                const d = await r.json();
                
                // Очистка от всех звездочек (*) в ответе
                const cleanText = d.content.replace(/\*/g, '');
                addMsg(cleanText, 'bot');
            } catch (e) {
                addMsg("❌ Ошибка связи с сервером. Проверь BACKEND_URL.", 'bot');
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`;
            d.innerText = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
