<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring AI Studio - Preview Fix</title>
    <style>
        :root { --sakura: #ffdae9; --leaf: #a8e063; --sky: #e3f2fd; --deep-green: #2d5a27; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, var(--sakura), var(--sky)); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Панель настроек */
        .header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 10px; border-bottom: 2px solid var(--sakura); }
        .row { display: flex; gap: 8px; }
        select { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--leaf); outline: none; background: white; font-size: 13px; cursor: pointer; }

        /* Окно чата */
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .user { align-self: flex-end; background: var(--leaf); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #444; border-bottom-left-radius: 2px; }
        
        /* Изображения в чате */
        .bot img { width: 100%; border-radius: 15px; margin-top: 10px; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .dl-btn { display: block; text-align: center; background: var(--deep-green); color: white; padding: 10px; border-radius: 12px; text-decoration: none; font-size: 13px; margin-top: 8px; font-weight: bold; }

        /* --- БЛОК ПРЕДПРОСМОТРА (Preview) --- */
        #preview-container { 
            display: none; /* Скрыто по умолчанию */
            background: white; 
            padding: 10px 15px; 
            border-top: 2px solid var(--leaf); 
            align-items: center; 
            gap: 15px; 
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .preview-wrapper { position: relative; width: 60px; height: 60px; }
        #imgPreview { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; border: 2px solid var(--sakura); }
        .btn-cancel { 
            position: absolute; top: -8px; right: -8px; 
            background: #ff4d4d; color: white; border: none; 
            width: 22px; height: 22px; border-radius: 50%; 
            cursor: pointer; font-weight: bold; font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Поле ввода */
        #input-area { background: white; padding: 15px; border-top: 1px solid var(--sakura); position: relative; }
        .loader { display: none; text-align: center; font-size: 13px; color: var(--deep-green); margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 12px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 20px; border: 2px solid var(--sakura); border-radius: 30px; outline: none; font-size: 15px; }
        .send-btn { background: var(--deep-green); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="row">
            <select id="modelSelect" onchange="updateModel()">
                <option value="gemini3flash">Gemini 3 Flash</option>
                <option value="gpt54">GPT-5.4</option>
                <option value="claudesonnet">Claude Sonnet 4.6</option>
            </select>
            <select id="ratioSelect">
                <option value="1:1">Квадрат (1:1)</option>
                <option value="16:9">Горизонт (16:9)</option>
                <option value="9:16">Портрет (9:16)</option>
            </select>
        </div>
    </div>

    <div id="chat">
        <div class="msg
