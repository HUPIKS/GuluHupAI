<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spring AI Studio</title>
    <style>
        :root { --sakura: #ffdae9; --leaf: #a8e063; --sky: #e3f2fd; --deep-green: #2d5a27; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: linear-gradient(135deg, var(--sakura), var(--sky)); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: rgba(255, 255, 255, 0.8); padding: 10px; border-bottom: 2px solid var(--sakura); z-index: 10; }
        .row { display: flex; gap: 8px; }
        select { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid var(--leaf); outline: none; background: white; font-size: 13px; }

        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .user { align-self: flex-end; background: var(--leaf); color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: white; color: #444; border-bottom-left-radius: 2px; }
        
        .bot img { width: 100%; border-radius: 15px; margin-top: 10px; border: 3px solid white; }
        .dl-btn { display: block; text-align: center; background: var(--deep-green); color: white; padding: 10px; border-radius: 12px; text-decoration: none; font-size: 13px; margin-top: 8px; font-weight: bold; }

        /* БЛОК ПРЕВЬЮ */
        #preview-container { 
            display: none; 
            background: white; 
            padding: 10px 15px; 
            border-top: 2px solid var(--leaf); 
            align-items: center; 
            gap: 15px;
        }
        .preview-wrapper { position: relative; width: 60px; height: 60px; }
        #imgPreview { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; border: 2px solid var(--sakura); }
        .btn-cancel { 
            position: absolute; top: -10px; right: -10px; 
            background: #ff4d4d; color: white; border: none; 
            width: 24px; height: 24px; border-radius: 50%; 
            cursor: pointer; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #input-area { background: white; padding: 15px; border-top: 1px solid var(--sakura); }
        .loader { display: none; text-align: center; font-size: 13px; color: var(--deep-green); margin-bottom: 8px; font-weight: bold; }
        .controls { display: flex; gap: 12px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 20px; border: 2px solid var(--sakura); border-radius: 30px; outline: none; }
        .send-btn { background: var(--deep-green); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="row">
            <select id="modelSelect" onchange="updateModel()">
                <option value="gemini3flash">Gemini 3 Flash</option>
                <option value="gpt54">GPT-5.4</option>
                <option value="claudesonnet">Claude Sonnet 4.6</option>
            </select>
            <select id="ratioSelect">
                <option value="1:1">1:1</option>
                <option value="16:9">16:9</option>
                <option value="9:16">9:16</option>
            </select>
        </div>
    </div>

    <div id="chat">
        <div class="msg bot">🌸 Привет! Вставь актуальный URL в код и всё заработает.</div>
    </div>

    <div id="preview-container">
        <div class="preview-wrapper">
            <img src="" id="imgPreview">
            <button class="btn-cancel" onclick="clearPhoto()">✕</button>
        </div>
        <div style="font-size: 13px; color: #555;">Фото выбрано</div>
    </div>

    <div id="input-area">
        <div class="loader" id="loader">🌸 ИИ думает...</div>
        <div class="controls">
            <label style="cursor:pointer; font-size: 28px;">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handlePreview(this)"> 🖼️
            </label>
            <input type="text" id="userInput" placeholder="Напиши запрос..." onkeypress="if(event.key==='Enter')send()">
            <button class="send-btn" onclick="send()">↑</button>
        </div>
    </div>

    <script>
        // ВАЖНО: Сюда вставь адрес своего сервера!
        // Если через ngrok, то "https://xxx-xx.ngrok-free.app"
        const BACKEND_URL = " https://328a-93-123-84-16.ngrok-free.app"; 

        function handlePreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('preview-container').style.display = 'flex';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearPhoto() {
            document.getElementById('fileInput').value = "";
            document.getElementById('preview-container').style.display = 'none';
        }

        async function updateModel() {
            const m = document.getElementById('modelSelect').value;
            try {
                await fetch(`${BACKEND_URL}/api/set_model`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ model: m })
                });
            } catch(e) { console.error("URL не отвечает"); }
        }

        async function send() {
            const textEl = document.getElementById('userInput');
            const fileEl = document.getElementById('fileInput');
            const ratio = document.getElementById('ratioSelect').value;
            
            if (!textEl.value && !fileEl.files[0]) return;

            addMsg(textEl.value || "🎨 Обработка...", 'user');
            document.getElementById('loader').style.display = 'block';
            
            const fileData = fileEl.files[0];
            clearPhoto();

            const fd = new FormData();
            fd.append('prompt', textEl.value);
            fd.append('ratio', ratio);
            if (fileData) fd.append('file', fileData);

            try {
                const r = await fetch(`${BACKEND_URL}/api/process`, { method: 'POST', body: fd });
                const d = await r.json();
                
                if (d.type === 'photo') {
                    addImg(d.content);
                } else {
                    // Очистка от звездочек
                    const cleanText = d.content.replace(/\*/g, '');
                    addMsg(cleanText, 'bot');
                }
            } catch (e) {
                addMsg("❌ Ошибка связи. Проверь BACKEND_URL!", 'bot');
            } finally {
                document.getElementById('loader').style.display = 'none';
                textEl.value = '';
            }
        }

        function addMsg(t, s) {
            const d = document.createElement('div');
            d.className = `msg ${s}`;
            d.innerText = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function addImg(b64) {
            const d = document.createElement('div');
            d.className = `msg bot`;
            const blob = b64ToBlob(b64, 'image/png');
            const url = URL.createObjectURL(blob);
            
            d.innerHTML = `<img src="${url}"><a href="${url}" download="photo.png" class="dl-btn">💾 СОХРАНИТЬ</a>`;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function b64ToBlob(b64, type) {
            const bin = atob(b64);
            const array = [];
            for (let i = 0; i < bin.length; i++) array.push(bin.charCodeAt(i));
            return new Blob([new Uint8Array(array)], {type: type});
        }
    </script>
</body>
</html>
